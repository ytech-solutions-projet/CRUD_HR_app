services:
  postgres:
    image: postgres:17
    container_name: crud_hr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ytech_hr}
      POSTGRES_USER: ${POSTGRES_USER:-hr_app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-LocalPostgres12345!}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - crud_hr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  crud_hr_postgres_data:
