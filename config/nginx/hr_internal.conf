server {
    listen 80;
    server_name hr.ytech.local;

    allow 10.20.10.0/24;
    allow 10.20.50.0/24;
    deny all;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hr.ytech.local;

    ssl_certificate /etc/ssl/certs/hr.ytech.local.crt;
    ssl_certificate_key /etc/ssl/private/hr.ytech.local.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Content-Security-Policy "default-src 'self';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    allow 10.20.10.0/24;
    allow 10.20.50.0/24;
    deny all;

    client_max_body_size 2m;

    location /static/ {
        alias /opt/ytech-hr/backend/staticfiles/;
        autoindex off;
    }

    location / {
        proxy_pass http://unix:/run/ytech-hr/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
